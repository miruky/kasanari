<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 392" role="img"
  aria-label="kasanari のアーキテクチャ図。入力を main.ts が受け取り、純粋ロジックの engine に処理を委ね、結果を DOM と localStorage に反映する。">
  <title>kasanari architecture</title>
  <style>
    .node { fill: #ffffff; stroke: #cbd2dd; stroke-width: 1.5; }
    .accent { fill: #ffffff; stroke: #4f46e5; stroke-width: 2; }
    .title { fill: #1b2230; font-weight: 700; }
    .sub { fill: #5c6675; }
    .edge { fill: none; stroke: #94a0b0; stroke-width: 1.6; }
    .edge-label { fill: #5c6675; }
    .tag { fill: #4f46e5; font-weight: 700; }
    text { font-family: 'Hiragino Sans', system-ui, sans-serif; }
    @media (prefers-color-scheme: dark) {
      .node { fill: #171b22; stroke: #2b3340; }
      .accent { fill: #171b22; stroke: #7c84ff; }
      .title { fill: #e7ebf2; }
      .sub { fill: #97a1b1; }
      .edge { stroke: #5c6675; }
      .edge-label { fill: #97a1b1; }
      .tag { fill: #7c84ff; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7"
      orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#94a0b0" />
    </marker>
  </defs>

  <!-- 入力 -->
  <rect class="node" x="270" y="24" width="180" height="60" rx="12" />
  <text class="title" x="360" y="50" text-anchor="middle" font-size="16">入力</text>
  <text class="sub" x="360" y="70" text-anchor="middle" font-size="12.5">矢印キー / WASD / スワイプ</text>

  <!-- main.ts -->
  <rect class="node" x="270" y="160" width="180" height="72" rx="12" />
  <text class="title" x="360" y="190" text-anchor="middle" font-size="16">main.ts</text>
  <text class="sub" x="360" y="211" text-anchor="middle" font-size="12.5">描画・入力・永続化</text>

  <!-- engine -->
  <rect class="accent" x="512" y="158" width="184" height="76" rx="12" />
  <text class="tag" x="604" y="184" text-anchor="middle" font-size="11">PURE / TESTED</text>
  <text class="title" x="604" y="205" text-anchor="middle" font-size="16">engine</text>
  <text class="sub" x="604" y="224" text-anchor="middle" font-size="12">newGame · move · isStuck</text>

  <!-- DOM -->
  <rect class="node" x="150" y="308" width="180" height="60" rx="12" />
  <text class="title" x="240" y="334" text-anchor="middle" font-size="15">DOM</text>
  <text class="sub" x="240" y="353" text-anchor="middle" font-size="12.5">盤面とタイルの描画</text>

  <!-- localStorage -->
  <rect class="node" x="390" y="308" width="180" height="60" rx="12" />
  <text class="title" x="480" y="334" text-anchor="middle" font-size="15">localStorage</text>
  <text class="sub" x="480" y="353" text-anchor="middle" font-size="12.5">スコアと盤面の保存</text>

  <!-- 入力 → main.ts -->
  <path class="edge" d="M360 84 L360 158" marker-end="url(#arrow)" />

  <!-- main.ts ⇄ engine -->
  <path class="edge" d="M450 184 L508 184" marker-end="url(#arrow)" />
  <text class="edge-label" x="479" y="176" text-anchor="middle" font-size="11.5">move(dir)</text>
  <path class="edge" d="M508 212 L452 212" marker-end="url(#arrow)" />
  <text class="edge-label" x="480" y="227" text-anchor="middle" font-size="11.5">MoveResult</text>

  <!-- main.ts → DOM / localStorage -->
  <path class="edge" d="M320 232 L255 306" marker-end="url(#arrow)" />
  <path class="edge" d="M408 232 L468 306" marker-end="url(#arrow)" />
</svg>
