<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <title>kasanari — 足して10で消すスライド数字パズル</title>
    <meta
      name="description"
      content="足して10になる数字どうしを重ねて消すスライドパズル。4×4から6×6、連鎖ボーナス、何手でも戻せるアンドゥ、配置の共有、ライト・ダーク切替。キーボードとスワイプで遊べる。"
    />
    <meta name="theme-color" content="#f4f5f8" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="kasanari" />
    <meta
      property="og:description"
      content="足して10になる数字どうしを重ねて消すスライドパズル。"
    />
    <meta property="og:image" content="%BASE_URL%logo.svg" />
    <script>
      // 初回描画前に保存済みテーマを反映し、ちらつきを防ぐ
      try {
        var pref = localStorage.getItem('kasanari:theme') || 'system';
        var dark =
          pref === 'dark' ||
          (pref !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      } catch (e) {
        /* localStorage が使えなくても既定テーマで動く */
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
